spring:
  datasource:
    url: jdbc:h2:mem:studentspace_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

  sql:
    init:
      mode: never

  security:
    oauth2:
      client:
        registration: {}
        provider: {}
